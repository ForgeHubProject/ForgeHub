<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForgeHub</title>
    <!--
      Resolve the theme before first paint to avoid a flash of the wrong theme.
      Mirrors the logic in src/ui/theme.tsx: an explicit stored choice wins,
      otherwise fall back to the OS preference. Keep the storage key in sync.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("fh_theme");
          var dark = stored === "dark" || (stored !== "light" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          root.classList.toggle("dark", dark);
          root.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
