server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # git-over-HTTP: needs raw streaming request bodies (pack data), not buffered.
    location /git/ {
        proxy_pass http://api:3001;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        client_max_body_size 0;
    }

    # Everything else the API owns (see apps/api/src/server.ts route registrations).
    location ~ ^/(health|auth|repos|users|notifications|search)(/|$) {
        proxy_pass http://api:3001;
    }

    # SPA — everything else falls through to index.html (react-router handles routing).
    location / {
        try_files $uri /index.html;
    }
}
